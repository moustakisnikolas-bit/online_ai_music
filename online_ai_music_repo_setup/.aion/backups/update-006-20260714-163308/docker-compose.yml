services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: aion
      POSTGRES_DB: aion
    ports:
      - "5432:5432"
    volumes:
      - aion-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion -d aion"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aion
      MINIO_ROOT_PASSWORD: change-me-now
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aion-minio:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://aion:aion@postgres:5432/aion
      REDIS_URL: redis://redis:6379/0
      GENERATED_AUDIO_DIR: /app/data/generated/audio
    ports:
      - "8000:8000"
    volumes:
      - ./data/generated:/app/data/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started

volumes:
  aion-postgres:
  aion-minio:
